# DeepSeek API 配置
deepseek:
  api_key: "sk-50f8e768565943d78b66d0952763a53b"    # 替换为你的 DeepSeek API Key
  model: "deepseek-chat"              # deepseek-chat 或 deepseek-reasoner
  base_url: "https://api.deepseek.com"

# Server酱 配置
serverchan:
  send_key: "SCT350177TIJKzfN2WNrvxrHDQp921gcGd"           # 替换为你的 Server酱 SendKey

# 数据配置
data:
  # 关注的指数代码 (东方财富代码)
  indices:
    - code: "1.000001"   # 上证指数
      name: "上证指数"
    - code: "0.399001"   # 深证成指
      name: "深证成指"
    - code: "0.399006"   # 创业板指
      name: "创业板指"
    - code: "0.000688"   # 科创50
      name: "科创50"
    - code: "1.000300"   # 沪深300
      name: "沪深300"

  # 关注板块数量 (涨跌前N)
